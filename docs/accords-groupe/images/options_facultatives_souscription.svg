<svg xmlns="http://www.w3.org/2000/svg" width="900" height="320" viewBox="0 0 900 320">
  <style>
    text { font-family: Arial, sans-serif; font-size: 11px; fill: #333; }
    .header { font-size: 12px; font-weight: bold; fill: white; }
    .subheader { font-size: 10px; fill: #333; font-weight: bold; }
    .small { font-size: 9px; fill: #555; }
    .note { font-size: 9px; fill: #666; font-style: italic; }
  </style>

  <!-- Title -->
  <text x="450" y="20" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a3c6e">Conditions de souscription et de renonciation aux options supplémentaires facultatives</text>

  <!-- Column headers -->
  <rect x="10" y="35" width="120" height="50" fill="#1a3c6e" rx="3"/>
  <text x="70" y="55" text-anchor="middle" class="header">Garanties</text>

  <!-- Event columns -->
  <rect x="135" y="35" width="200" height="25" fill="#2c5ea0" rx="3"/>
  <text x="235" y="52" text-anchor="middle" class="header" font-size="10">Mise en place du contrat</text>
  <text x="235" y="72" text-anchor="middle" class="small">ou embauche</text>

  <rect x="340" y="35" width="200" height="25" fill="#2c5ea0" rx="3"/>
  <text x="440" y="52" text-anchor="middle" class="header" font-size="10">Changement situation famille</text>
  <text x="440" y="72" text-anchor="middle" class="small">(naissance, mariage, PACS, divorce...)</text>

  <rect x="545" y="35" width="180" height="25" fill="#2c5ea0" rx="3"/>
  <text x="635" y="52" text-anchor="middle" class="header" font-size="10">Autres événements</text>
  <text x="635" y="72" text-anchor="middle" class="small">ou non-respect des délais</text>

  <rect x="730" y="35" width="160" height="25" fill="#2c5ea0" rx="3"/>
  <text x="810" y="52" text-anchor="middle" class="header" font-size="10">Renonciation*</text>

  <!-- Sub-headers row -->
  <rect x="135" y="85" width="95" height="30" fill="#e8eef5" stroke="#ccc"/>
  <text x="182" y="103" text-anchor="middle" class="subheader" font-size="9">Délai de</text>
  <text x="182" y="113" text-anchor="middle" class="subheader" font-size="9">souscription</text>

  <rect x="235" y="85" width="100" height="30" fill="#e8eef5" stroke="#ccc"/>
  <text x="285" y="105" text-anchor="middle" class="subheader" font-size="9">Date d'effet</text>

  <rect x="340" y="85" width="95" height="30" fill="#e8eef5" stroke="#ccc"/>
  <text x="387" y="103" text-anchor="middle" class="subheader" font-size="9">Délai de</text>
  <text x="387" y="113" text-anchor="middle" class="subheader" font-size="9">souscription</text>

  <rect x="440" y="85" width="100" height="30" fill="#e8eef5" stroke="#ccc"/>
  <text x="490" y="105" text-anchor="middle" class="subheader" font-size="9">Date d'effet</text>

  <rect x="545" y="85" width="180" height="30" fill="#e8eef5" stroke="#ccc"/>
  <text x="635" y="100" text-anchor="middle" class="subheader" font-size="9">Date d'effet des cotisations</text>
  <text x="635" y="112" text-anchor="middle" class="subheader" font-size="9">et des garanties</text>

  <rect x="730" y="85" width="75" height="30" fill="#e8eef5" stroke="#ccc"/>
  <text x="767" y="103" text-anchor="middle" class="subheader" font-size="9">Délai pour</text>
  <text x="767" y="113" text-anchor="middle" class="subheader" font-size="9">renoncer</text>

  <rect x="810" y="85" width="80" height="30" fill="#e8eef5" stroke="#ccc"/>
  <text x="850" y="100" text-anchor="middle" class="subheader" font-size="9">Date d'effet de</text>
  <text x="850" y="112" text-anchor="middle" class="subheader" font-size="9">la renonciation</text>

  <!-- Guarantee rows -->
  <rect x="10" y="120" width="120" height="60" fill="#f5f7fa" stroke="#ccc"/>
  <text x="70" y="140" text-anchor="middle" font-size="10">Capital décès</text>
  <text x="70" y="152" text-anchor="middle" font-size="10">supplémentaire</text>
  <text x="70" y="168" text-anchor="middle" font-size="10">Capital décès suppl.</text>
  <text x="70" y="178" text-anchor="middle" font-size="10">accidentel</text>

  <!-- Data cells -->
  <rect x="135" y="120" width="95" height="60" fill="white" stroke="#ccc"/>
  <text x="182" y="155" text-anchor="middle" font-weight="bold">2 mois</text>

  <rect x="235" y="120" width="100" height="60" fill="white" stroke="#ccc"/>
  <text x="285" y="145" text-anchor="middle" font-size="10">Date</text>
  <text x="285" y="157" text-anchor="middle" font-size="10">d'affiliation</text>
  <text x="285" y="169" text-anchor="middle" font-size="10">ou date</text>
  <text x="285" y="181" text-anchor="middle" font-size="10">d'embauche</text>

  <rect x="340" y="120" width="95" height="60" fill="white" stroke="#ccc"/>
  <text x="387" y="155" text-anchor="middle" font-weight="bold">2 mois</text>

  <rect x="440" y="120" width="100" height="60" fill="white" stroke="#ccc"/>
  <text x="490" y="148" text-anchor="middle" font-size="10">1er jour du</text>
  <text x="490" y="160" text-anchor="middle" font-size="10">mois suivant</text>
  <text x="490" y="172" text-anchor="middle" font-size="10">l'événement</text>

  <rect x="545" y="120" width="180" height="60" fill="white" stroke="#ccc"/>
  <text x="635" y="140" text-anchor="middle" font-size="10">Avec formalités médicales</text>
  <text x="635" y="155" text-anchor="middle" font-size="10">1er jour du mois suivant</text>
  <text x="635" y="170" text-anchor="middle" font-size="10">l'acceptation de la</text>
  <text x="635" y="182" text-anchor="middle" font-size="10">demande</text>

  <rect x="730" y="120" width="75" height="60" fill="white" stroke="#ccc"/>
  <text x="767" y="155" text-anchor="middle" font-size="10">À tout</text>
  <text x="767" y="167" text-anchor="middle" font-size="10">moment</text>

  <rect x="810" y="120" width="80" height="60" fill="white" stroke="#ccc"/>
  <text x="850" y="148" text-anchor="middle" font-size="10">1er jour du</text>
  <text x="850" y="160" text-anchor="middle" font-size="10">mois suivant</text>
  <text x="850" y="172" text-anchor="middle" font-size="10">la demande</text>

  <!-- Footnote -->
  <text x="10" y="210" class="note">* En cas de renonciation, la possibilité de souscrire à nouveau n'est ouverte qu'en cas de changement de situation de famille.</text>
  <text x="10" y="225" class="note">Les cotisations correspondant à ces options supplémentaires facultatives sont à la charge exclusive du participant.</text>
</svg>
